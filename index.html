<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>三下数学·四连方拼图挑战</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', '微软雅黑', sans-serif;
            background: linear-gradient(145deg, #2b5a4c 0%, #1d7a5e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        .game-box {
            max-width: 900px;
            width: 100%;
            background: #f5f0e8;
            border-radius: 48px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            padding: 24px 24px 30px;
        }
        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            color: #1d4a3e;
            text-align: center;
            margin-bottom: 8px;
        }
        .subtitle {
            text-align: center;
            color: #3a6b5a;
            margin-bottom: 20px;
            font-size: 1rem;
        }
        
        /* 主区域：左侧网格 + 右侧信息 */
        .play-area {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        /* 8x8 拼图网格 */
        .grid-container {
            background: #c4a484;
            padding: 12px;
            border-radius: 24px;
            box-shadow: inset 0 0 0 2px #a5836b, 0 8px 0 #5e4a3a;
        }
        .grid-8x8 {
            display: grid;
            grid-template-columns: repeat(8, 45px);
            gap: 4px;
        }
        .grid-cell {
            width: 45px;
            height: 45px;
            background: #fef5e6;
            border-radius: 8px;
            box-shadow: inset 0 -2px 0 #b59678;
            border: 1.5px solid #d4bbaa;
            transition: background 0.1s;
        }
        .grid-cell.occupied {
            box-shadow: inset 0 -2px 0 #8b6f58;
            border-color: #a5836b;
        }
        
        /* 右侧控制面板 */
        .control-panel {
            flex: 1;
            min-width: 220px;
            background: #e8dccc;
            border-radius: 30px;
            padding: 18px 16px;
            box-shadow: inset 0 1px 4px #fff5e6, 0 6px 0 #7b5e4a;
        }
        .panel-title {
            font-weight: 700;
            color: #3e2c1e;
            font-size: 1.2rem;
            margin-bottom: 15px;
        }
        .shape-selector {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .shape-btn {
            background: #fff7ed;
            border: 2px solid #a5836b;
            border-radius: 16px;
            padding: 10px;
            cursor: pointer;
            box-shadow: 0 4px 0 #7b5e4a;
            transition: 0.05s;
        }
        .shape-btn.active {
            border: 3px solid #c44b3d;
            box-shadow: 0 2px 0 #7b5e4a;
            transform: translateY(2px);
        }
        .mini-shape {
            display: inline-grid;
            gap: 3px;
        }
        .mini-block {
            width: 28px;
            height: 28px;
            background: #c44b3d;
            border-radius: 6px;
        }
        .mini-block.empty {
            background: transparent;
            border: 1px dashed #aaa;
        }
        
        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin: 20px 0;
        }
        .btn {
            background: #f0d5b0;
            border: none;
            border-bottom: 4px solid #7b5e4a;
            color: #3e2c1e;
            font-weight: bold;
            font-size: 1rem;
            padding: 12px 16px;
            border-radius: 40px;
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            border: 1.5px solid #b39276;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .btn:active {
            transform: translateY(3px);
            border-bottom-width: 2px;
        }
        .btn.small {
            padding: 8px 12px;
            font-size: 0.9rem;
        }
        
        .stats {
            background: #d4c4b0;
            border-radius: 20px;
            padding: 12px 16px;
            margin-top: 15px;
        }
        
        .mode-tabs {
            display: flex;
            gap: 6px;
            margin-bottom: 15px;
        }
        .mode-tab {
            background: #cbbaa8;
            padding: 8px 12px;
            border-radius: 30px;
            font-size: 0.9rem;
            cursor: pointer;
            border: none;
            font-weight: 500;
        }
        .mode-tab.active {
            background: #a5836b;
            color: white;
        }
        
        .footer-bar {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
        }
    </style>
</head>
<body>
<div class="game-box">
    <h1>🧩 拼图挑战</h1>
    <div class="subtitle">人教版·三年级下册 —— 四连方大冒险</div>
    
    <div class="play-area">
        <!-- 左侧：8x8网格 -->
        <div class="grid-container">
            <div class="grid-8x8" id="puzzleGrid"></div>
        </div>
        
        <!-- 右侧：控制区 -->
        <div class="control-panel">
            <div class="mode-tabs">
                <button class="mode-tab active" data-mode="free">🎨 自由拼图</button>
                <button class="mode-tab" data-mode="rectangle">📐 拼长方形</button>
            </div>
            
            <div class="panel-title">📦 选形状</div>
            <div class="shape-selector" id="shapeSelector"></div>
            
            <div class="action-buttons">
                <button class="btn" id="rotateBtn">🔄 旋转后再放置</button>
                <button class="btn" id="flipBtn">🪞 翻转得镜像形状</button>
                <button class="btn" id="undoBtn">↩️ 撤销可以反悔</button>
                <button class="btn" id="clearBtn">🧹 清空所有</button>
            </div>
            
            <div class="stats">
                <div>📊 已放置 <span id="placedCount">0</span> 个四连方 / 共 <span id="cellCount">0</span> 格</div>
                <div style="margin-top:8px;">⭐ 当前选中: <span id="selectedShapeName">一字型</span></div>
            </div>
        </div>
    </div>
    
    <div class="footer-bar">
        <button class="btn small" id="fullscreenBtn">🖥️ 全屏观看</button>
        <span style="color:#5e4a3a;">✨ 单击形状选中 · 点击网格放置</span>
    </div>
</div>

<script>
    (function(){
        "use strict";
        
        // ---------- 配置 ----------
        const GRID_SIZE = 8;  // 8x8
        
        // 五种标准四连方（原始矩阵）
        const SHAPES = [
            { id: 'I', name: '一字型', matrix: [[1,1,1,1]], color: '#C44B3D' },
            { id: 'O', name: '田字型', matrix: [[1,1],[1,1]], color: '#3F7C85' },
            { id: 'L', name: 'L型', matrix: [[1,0],[1,0],[1,1]], color: '#D98C3D' },
            { id: 'T', name: 'T型', matrix: [[1,1,1],[0,1,0]], color: '#8B6B9E' },
            { id: 'Z', name: 'Z型', matrix: [[1,1,0],[0,1,1]], color: '#5F9C6B' }
        ];
        
        // 状态
        let gridState = Array(GRID_SIZE).fill().map(() => Array(GRID_SIZE).fill(null));
        let placedShapes = [];   // { shapeId, cells, color, shapeIndex }
        let history = [];        // 用于撤销
        
        let currentShapeIndex = 0;           // 0-4
        let currentRotation = 0;             // 0-3
        let currentFlipped = false;          // 是否镜像翻转
        
        let currentMode = 'free';             // 'free' 或 'rectangle'
        
        const gridEl = document.getElementById('puzzleGrid');
        const shapeSelector = document.getElementById('shapeSelector');
        const placedSpan = document.getElementById('placedCount');
        const cellSpan = document.getElementById('cellCount');
        const selectedNameSpan = document.getElementById('selectedShapeName');
        
        // ---------- 辅助函数：旋转矩阵 ----------
        function rotateMatrix(mat, times) {
            let m = mat.map(row => [...row]);
            for (let t = 0; t < times; t++) {
                const rows = m.length, cols = m[0].length;
                const rotated = Array(cols).fill().map(() => Array(rows).fill(0));
                for (let i = 0; i < rows; i++) {
                    for (let j = 0; j < cols; j++) {
                        rotated[j][rows - 1 - i] = m[i][j];
                    }
                }
                m = rotated;
            }
            return m;
        }
        
        // 镜像翻转（水平翻转）
        function flipMatrix(mat) {
            return mat.map(row => [...row].reverse());
        }
        
        // 获取当前形状的最终矩阵
        function getCurrentMatrix() {
            let matrix = SHAPES[currentShapeIndex].matrix.map(row => [...row]);
            if (currentFlipped) {
                matrix = flipMatrix(matrix);
            }
            matrix = rotateMatrix(matrix, currentRotation);
            return matrix;
        }
        
        // ---------- 渲染网格 ----------
        function renderGrid() {
            gridEl.innerHTML = '';
            let occupiedCells = 0;
            
            for (let r = 0; r < GRID_SIZE; r++) {
                for (let c = 0; c < GRID_SIZE; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'grid-cell';
                    const shapeId = gridState[r][c];
                    if (shapeId !== null) {
                        cell.classList.add('occupied');
                        const placed = placedShapes.find(p => p.shapeId === shapeId);
                        if (placed) cell.style.backgroundColor = placed.color;
                        occupiedCells++;
                    } else {
                        cell.style.backgroundColor = '';
                    }
                    
                    cell.dataset.row = r;
                    cell.dataset.col = c;
                    
                    cell.addEventListener('click', () => placeShapeAt(r, c));
                    
                    gridEl.appendChild(cell);
                }
            }
            
            placedSpan.textContent = placedShapes.length;
            cellSpan.textContent = occupiedCells;
        }
        
        // ---------- 放置形状 ----------
        function placeShapeAt(startRow, startCol) {
            const matrix = getCurrentMatrix();
            const rows = matrix.length, cols = matrix[0].length;
            
            // 检查越界
            for (let dr = 0; dr < rows; dr++) {
                for (let dc = 0; dc < cols; dc++) {
                    if (matrix[dr][dc] === 1) {
                        const nr = startRow + dr, nc = startCol + dc;
                        if (nr < 0 || nr >= GRID_SIZE || nc < 0 || nc >= GRID_SIZE) {
                            alert('❌ 超出网格边界');
                            return;
                        }
                    }
                }
            }
            
            // 检查重叠
            for (let dr = 0; dr < rows; dr++) {
                for (let dc = 0; dc < cols; dc++) {
                    if (matrix[dr][dc] === 1) {
                        const nr = startRow + dr, nc = startCol + dc;
                        if (gridState[nr][nc] !== null) {
                            alert('❌ 不能与其他方块重叠');
                            return;
                        }
                    }
                }
            }
            
            // 如果是长方形模式，检查是否越界（只允许在指定区域？自由模式忽略）
            
            // 保存历史
            saveHistory();
            
            // 放置
            const shapeId = `s_${Date.now()}_${Math.random()}`;
            const cells = [];
            const color = SHAPES[currentShapeIndex].color;
            
            for (let dr = 0; dr < rows; dr++) {
                for (let dc = 0; dc < cols; dc++) {
                    if (matrix[dr][dc] === 1) {
                        const nr = startRow + dr, nc = startCol + dc;
                        gridState[nr][nc] = shapeId;
                        cells.push({ r: nr, c: nc });
                    }
                }
            }
            
            placedShapes.push({
                shapeId, cells, color,
                shapeIndex: currentShapeIndex
            });
            
            renderGrid();
        }
        
        // 保存历史
        function saveHistory() {
            history.push({
                grid: gridState.map(row => [...row]),
                placed: placedShapes.map(p => ({...p, cells: p.cells.map(c=>({...c}))}))
            });
        }
        
        // 撤销
        function undo() {
            if (history.length === 0) { alert('没有可撤销的操作'); return; }
            const prev = history.pop();
            gridState = prev.grid.map(row => [...row]);
            placedShapes = prev.placed.map(p => ({...p, cells: p.cells.map(c=>({...c}))}));
            renderGrid();
        }
        
        // 清空
        function clearAll() {
            if (placedShapes.length === 0) return;
            saveHistory();
            gridState = Array(GRID_SIZE).fill().map(() => Array(GRID_SIZE).fill(null));
            placedShapes = [];
            renderGrid();
        }
        
        // ---------- 渲染形状选择器 ----------
        function renderShapeSelector() {
            shapeSelector.innerHTML = '';
            SHAPES.forEach((shape, idx) => {
                const btn = document.createElement('div');
                btn.className = 'shape-btn' + (idx === currentShapeIndex ? ' active' : '');
                
                // 显示当前旋转+翻转的预览（简化：显示原始形状）
                const matrix = shape.matrix;
                const gridDiv = document.createElement('div');
                gridDiv.className = 'mini-shape';
                gridDiv.style.gridTemplateColumns = `repeat(${matrix[0].length}, 1fr)`;
                
                for (let r = 0; r < matrix.length; r++) {
                    for (let c = 0; c < matrix[0].length; c++) {
                        const block = document.createElement('div');
                        block.className = 'mini-block' + (matrix[r][c] === 0 ? ' empty' : '');
                        if (matrix[r][c] === 1) block.style.backgroundColor = shape.color;
                        gridDiv.appendChild(block);
                    }
                }
                
                btn.appendChild(gridDiv);
                const nameSpan = document.createElement('div');
                nameSpan.style.fontSize = '12px';
                nameSpan.style.marginTop = '5px';
                nameSpan.textContent = shape.name;
                btn.appendChild(nameSpan);
                
                btn.addEventListener('click', () => {
                    currentShapeIndex = idx;
                    currentRotation = 0;
                    currentFlipped = false;
                    updateSelectedDisplay();
                    renderShapeSelector();
                });
                
                shapeSelector.appendChild(btn);
            });
            updateSelectedDisplay();
        }
        
        function updateSelectedDisplay() {
            selectedNameSpan.textContent = SHAPES[currentShapeIndex].name + 
                (currentFlipped ? ' (镜像)' : '') + 
                (currentRotation > 0 ? ` ↻${currentRotation*90}°` : '');
            
            // 高亮active
            document.querySelectorAll('.shape-btn').forEach((btn, i) => {
                if (i === currentShapeIndex) btn.classList.add('active');
                else btn.classList.remove('active');
            });
        }
        
        // 旋转
        function rotateShape() {
            currentRotation = (currentRotation + 1) % 4;
            updateSelectedDisplay();
            renderShapeSelector(); // 刷新预览（这里简化，预览不变也行）
        }
        
        // 翻转
        function flipShape() {
            currentFlipped = !currentFlipped;
            updateSelectedDisplay();
        }
        
        // 全屏
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }
        
        // 切换模式
        function setMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.mode-tab').forEach(tab => {
                tab.classList.toggle('active', tab.dataset.mode === mode);
            });
            // 可以加提示
        }
        
        // ---------- 初始化 ----------
        function init() {
            renderGrid();
            renderShapeSelector();
            
            document.getElementById('rotateBtn').addEventListener('click', rotateShape);
            document.getElementById('flipBtn').addEventListener('click', flipShape);
            document.getElementById('undoBtn').addEventListener('click', undo);
            document.getElementById('clearBtn').addEventListener('click', clearAll);
            document.getElementById('fullscreenBtn').addEventListener('click', toggleFullscreen);
            
            document.querySelectorAll('.mode-tab').forEach(tab => {
                tab.addEventListener('click', () => setMode(tab.dataset.mode));
            });
        }
        
        init();
    })();
</script>
</body>
</html>
