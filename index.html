<!DOCTYPE html><br/><html lang="zh"><br/><head><br/>    <meta charset="UTF-8"><br/>    <title>四连方拼图</title><br/>    <style><br/>        body {<br/>            font-family: Arial, sans-serif;<br/>            text-align: center;<br/>            padding: 20px;<br/>            background: #f5f0e8;<br/>        }<br/>        h1 { color: #4a3729; }<br/>        .grid {<br/>            display: inline-grid;<br/>            grid-template-columns: repeat(4, 80px);<br/>            gap: 8px;<br/>            background: #a5836b;<br/>            padding: 20px;<br/>            border-radius: 20px;<br/>            margin: 20px auto;<br/>        }<br/>        .cell {<br/>            width: 80px;<br/>            height: 80px;<br/>            background: #fef1e0;<br/>            border-radius: 10px;<br/>            border: 2px solid #8b6f58;<br/>        }<br/>        .cell.filled {<br/>            background: #d98c3d;<br/>        }<br/>        .shapes {<br/>            display: flex;<br/>            justify-content: center;<br/>            flex-wrap: wrap;<br/>            gap: 20px;<br/>            margin: 20px 0;<br/>        }<br/>        .shape {<br/>            background: #fff7ed;<br/>            padding: 10px;<br/>            border-radius: 15px;<br/>            cursor: pointer;<br/>            border: 2px solid #a5836b;<br/>        }<br/>        .shape-grid {<br/>            display: inline-grid;<br/>            gap: 4px;<br/>        }<br/>        .mini {<br/>            width: 30px;<br/>            height: 30px;<br/>            background: #c44b3d;<br/>            border-radius: 5px;<br/>        }<br/>        .mini.empty {<br/>            background: transparent;<br/>            border: 1px dashed #ccc;<br/>        }<br/>        button {<br/>            background: #a5836b;<br/>            color: white;<br/>            border: none;<br/>            padding: 10px 25px;<br/>            font-size: 18px;<br/>            border-radius: 30px;<br/>            cursor: pointer;<br/>            margin: 10px;<br/>        }<br/>    </style><br/></head><br/><body><br/>    <h1>🧩 四连方拼图</h1><br/>    <p>人教版·三年级下册</p ><br/><br/>    <div class="grid" id="grid"></div><br/><br/>    <div class="shapes"><br/>        <div class="shape" data-shape="I"><br/>            <div class="shape-grid" style="grid-template-columns:repeat(4,1fr)"><br/>                <div class="mini"></div><div class="mini"></div><div class="mini"></div><div class="mini"></div><br/>            </div><br/>            <p>一字型</p ><br/>        </div><br/>        <div class="shape" data-shape="O"><br/>            <div class="shape-grid" style="grid-template-columns:repeat(2,1fr)"><br/>                <div class="mini"></div><div class="mini"></div><br/>                <div class="mini"></div><div class="mini"></div><br/>            </div><br/>            <p>田字型</p ><br/>        </div><br/>        <div class="shape" data-shape="L"><br/>            <div class="shape-grid" style="grid-template-columns:repeat(2,1fr)"><br/>                <div class="mini"></div><div class="mini empty"></div><br/>                <div class="mini"></div><div class="mini empty"></div><br/>                <div class="mini"></div><div class="mini"></div><br/>            </div><br/>            <p>L型</p ><br/>        </div><br/>        <div class="shape" data-shape="T"><br/>            <div class="shape-grid" style="grid-template-columns:repeat(3,1fr)"><br/>                <div class="mini"></div><div class="mini"></div><div class="mini"></div><br/>                <div class="mini empty"></div><div class="mini"></div><div class="mini empty"></div><br/>            </div><br/>            <p>T型</p ><br/>        </div><br/>    </div><br/><br/>    <button onclick="resetGrid()">🧹 清空网格</button><br/><br/>    <script><br/>        const gridEl = document.getElementById('grid');<br/>        const cells = [];<br/><br/>        // 创建4x4网格<br/>        for (let i = 0; i < 16; i++) {<br/>            const cell = document.createElement('div');<br/>            cell.className = 'cell';<br/>            cell.dataset.index = i;<br/>            cell.onclick = function() {<br/>                if (selectedShape) {<br/>                    placeShape(this);<br/>                }<br/>            };<br/>            gridEl.appendChild(cell);<br/>            cells.push(cell);<br/>        }<br/><br/>        let selectedShape = null;<br/>        const shapes = document.querySelectorAll('.shape');<br/>        shapes.forEach(s => {<br/>            s.onclick = function() {<br/>                shapes.forEach(x => x.style.borderColor = '#a5836b');<br/>                this.style.borderColor = '#c44b3d';<br/>                selectedShape = this.dataset.shape;<br/>            };<br/>        });<br/><br/>        function placeShape(cell) {<br/>            alert('点击了格子！当前选中形状：' + (selectedShape || '未选中'));<br/>            // 简化版：只做演示，完整拖拽功能需要更多代码<br/>        }<br/><br/>        function resetGrid() {<br/>            cells.forEach(c => c.className = 'cell');<br/>            selectedShape = null;<br/>            shapes.forEach(x => x.style.borderColor = '#a5836b');<br/>        }<br/>    </script><br/></body><br/></html>
